name: Python package

on:
  push:
    branches: [ "master", "develop" ]
  pull_request:
    branches: [ "master", "develop" ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      # Run all Python versions even if one fails, to get full compatibility picture
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        python -m pip install -e ".[dev]"
    - name: Lint with ruff
      run: |
        ruff check .
    - name: Type-check with mypy
      # The project directory name contains hyphens (invalid Python package name), so mypy
      # cannot analyse it in-place. We copy the .py files to a valid temp directory first.
      # See DECISIONS.md D1 for full context.
      run: |
        mkdir -p /tmp/thatnode
        cp *.py /tmp/thatnode/
        cd /tmp/thatnode
        mypy *.py --ignore-missing-imports --follow-imports=skip
    - name: Test with pytest and coverage
      run: |
        pytest --cov-fail-under=100
